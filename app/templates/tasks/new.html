{% extends "base.html" %}
{% block title %}New Task — TaskFlow{% endblock %}
{% block page_title %}New Task{% endblock %}

{% block content %}
<div style="max-width:600px">
  <div class="card">
    <div class="card-body">
      <form method="post" action="/tasks/new">
        <div class="mb-3">
          <label class="form-label small fw-semibold">Task Title *</label>
          <input type="text" name="title" class="form-control" placeholder="What needs to be done?" required>
        </div>
        <div class="mb-3">
          <label class="form-label small fw-semibold">Description</label>
          <textarea name="description" class="form-control" rows="3" placeholder="Optional details…"></textarea>
        </div>
        <div class="row g-2 mb-3">
          <div class="col-md-6">
            <label class="form-label small fw-semibold">Project *</label>
            <select name="project_id" class="form-select" required>
              <option value="">Select project…</option>
              {% for p in projects %}
              <option value="{{ p.id }}" {% if selected_project == p.id %}selected{% endif %}>{{ p.title }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label small fw-semibold">Assign To</label>
            <select name="assigned_to" class="form-select">
              <option value="">Unassigned</option>
              {% for u in all_users %}
              <option value="{{ u.id }}">{{ u.name }}</option>
              {% endfor %}
            </select>
          </div>
        </div>
        <div class="row g-2 mb-4">
          <div class="col-md-6">
            <label class="form-label small fw-semibold">Priority</label>
            <select name="priority" class="form-select">
              {% for p in priorities %}
              <option value="{{ p }}" {% if p == 'medium' %}selected{% endif %}>{{ p.title() }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label small fw-semibold">Due Date</label>
            <input type="datetime-local" name="due_date" class="form-control">
          </div>
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary">Create Task</button>
          <a href="/tasks/" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
