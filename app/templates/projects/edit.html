{% extends "base.html" %}
{% block title %}Edit Project — TaskFlow{% endblock %}
{% block page_title %}Edit Project{% endblock %}

{% block content %}
<div style="max-width:560px">
  <div class="card">
    <div class="card-body">
      <form method="post" action="/projects/{{ project.id }}/edit">
        <div class="mb-3">
          <label class="form-label small fw-semibold">Project Title *</label>
          <input type="text" name="title" class="form-control" value="{{ project.title }}" required>
        </div>
        <div class="mb-4">
          <label class="form-label small fw-semibold">Description</label>
          <textarea name="description" class="form-control" rows="3">{{ project.description or '' }}</textarea>
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary">Save Changes</button>
          <a href="/projects/{{ project.id }}" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
