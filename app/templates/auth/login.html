<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — TaskFlow</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f8f9fc; font-family: 'Segoe UI', sans-serif; }
    .auth-card { max-width: 420px; margin: 6rem auto; background: #fff; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); padding: 2.5rem; }
    .brand { font-size: 1.3rem; font-weight: 700; color: #6366f1; }
    .btn-primary { background: #6366f1; border-color: #6366f1; }
    .btn-primary:hover { background: #4f46e5; border-color: #4f46e5; }
    .form-control:focus { border-color: #6366f1; box-shadow: 0 0 0 0.2rem rgba(99,102,241,0.2); }
  </style>
</head>
<body>
<div class="auth-card">
  <div class="text-center mb-4">
    <div class="brand mb-1">&#x25A6; TaskFlow</div>
    <h5 class="fw-semibold">Welcome back</h5>
    <p class="text-muted small">Sign in to your account</p>
  </div>

  {% if error %}
  <div class="alert alert-danger py-2 small">{{ error }}</div>
  {% endif %}

  <form method="post" action="/auth/login">
    <div class="mb-3">
      <label class="form-label small fw-semibold">Email</label>
      <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
    </div>
    <div class="mb-4">
      <label class="form-label small fw-semibold">Password</label>
      <input type="password" name="password" class="form-control" placeholder="••••••••" required>
    </div>
    <button type="submit" class="btn btn-primary w-100">Sign in</button>
  </form>

  <p class="text-center text-muted small mt-3 mb-0">
    No account? <a href="/auth/register" style="color:#6366f1">Create one</a>
  </p>
</div>
</body>
</html>
